<!DOCTYPE html>
<html>
<head>
    <title>Family Tip Top</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎉 Family Tip Top</h1>

<p>Choose a color</p>

<div class="colors">
<button onclick="chooseColor('Red')">🔴 Red</button>
<button onclick="chooseColor('Blue')">🔵 Blue</button>
<button onclick="chooseColor('Green')">🟢 Green</button>
<button onclick="chooseColor('Yellow')">🟡 Yellow</button>
</div>


<div id="tiptop" onclick="openTip()">
    <div class="part one">?</div>
    <div class="part two">?</div>
    <div class="part three">?</div>
    <div class="part four">?</div>
</div>


<div id="numbers" class="hide">

<p>Choose a number</p>

<button onclick="showPrize(1)">1</button>
<button onclick="showPrize(2)">2</button>
<button onclick="showPrize(3)">3</button>
<button onclick="showPrize(4)">4</button>
<button onclick="showPrize(5)">5</button>
<button onclick="showPrize(6)">6</button>
<button onclick="showPrize(7)">7</button>
<button onclick="showPrize(8)">8</button>
<button onclick="showPrize(9)">9</button>

</div>


<h2 id="result"></h2>


</div>


<script src="script.js"></script>

</body>
</html>
