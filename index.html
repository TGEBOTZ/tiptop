<!DOCTYPE html>
<html>
<head>
<title>Family Tip Top</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎉 Family Tip Top</h1>

<p>Choose a color</p>

<div class="colors">
<button onclick="playGame('Red')">🔴 Red</button>
<button onclick="playGame('Blue')">🔵 Blue</button>
<button onclick="playGame('Green')">🟢 Green</button>
<button onclick="playGame('Yellow')">🟡 Yellow</button>
</div>


<div id="tiptop">

<div class="part one">?</div>
<div class="part two">?</div>
<div class="part three">?</div>
<div class="part four">?</div>

</div>


<h2 id="number"></h2>

<h2 id="result"></h2>


<button id="restart" onclick="resetGame()">🔄 Play Again</button>


</div>


<script src="script.js"></script>

</body>
</html>
