<!DOCTYPE html>
<html>
<head>
<title>Family Tip Top</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎉 Family Tip Top</h1>

<p>Choose a number</p>

<div id="tiptop">

<button onclick="playGame(1)" class="box red">1</button>
<button onclick="playGame(2)" class="box blue">2</button>
<button onclick="playGame(3)" class="box green">3</button>

<button onclick="playGame(4)" class="box yellow">4</button>
<button onclick="playGame(5)" class="box red">5</button>
<button onclick="playGame(6)" class="box blue">6</button>

<button onclick="playGame(7)" class="box green">7</button>
<button onclick="playGame(8)" class="box yellow">8</button>
<button onclick="playGame(9)" class="box red">9</button>

</div>


<h2 id="number"></h2>

<h2 id="result"></h2>


</div>

<script src="script.js"></script>

</body>
</html>
